name: CI

on:
  push:
  pull_request:

jobs:

  # ── Frontend lint ──────────────────────────────────────────────────────────
  lint-frontend:
    name: lint-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  # ── Frontend tests ─────────────────────────────────────────────────────────
  test-frontend:
    name: test-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Run smoke and unit tests
        working-directory: frontend
        run: |
          find src -name "*.test.js" -o -name "*.smoke.test.js" \
            | sort \
            | while IFS= read -r f; do
                echo "▶ $f"
                node "$f" || exit 1
              done

  # ── Backend tests ──────────────────────────────────────────────────────────
  test-backend:
    name: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Run Maven tests
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw -q test

  # ── Docker build ───────────────────────────────────────────────────────────
  build-docker:
    name: build-docker
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: hermes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security scan ──────────────────────────────────────────────────────────
  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '0'

  # ── Docs deploy ────────────────────────────────────────────────────────────
  deploy-docs:
    name: deploy-docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && vars.HERMES_DEPLOY_DOCS == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          enable_jekyll: false
