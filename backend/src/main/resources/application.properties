spring.application.name=backend

# deployment: set HERMES_ENV=production on public servers (enforces stronger Strava webhook settings when Strava is enabled)
hermes.environment=${HERMES_ENV:development}

# hide stack traces from default error responses (controllers still return explicit JSON errors)
server.error.include-stacktrace=never
server.error.include-exception=false

# trust X-Forwarded-* from reverse proxy (nginx, cloud load balancer)
server.forward-headers-strategy=framework

# production: enforce HTTPS at the app layer (safe behind reverse proxy)
app.security.force-https=${APP_FORCE_HTTPS:false}

# optional: comma-separated origins if the React app is not served from the same host as /api (e.g. https://app.example.com)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

# set true only when the site is served over HTTPS everywhere (via reverse TLS termination is OK)
app.security.enable-hsts=${APP_ENABLE_HSTS:true}

# Database configuration
# Default storage is local H2. To switch to PostgreSQL, provide APP_DB_URL, APP_DB_USERNAME,
# APP_DB_PASSWORD, and APP_DB_DRIVER=org.postgresql.Driver before startup.
spring.datasource.url=${APP_DB_URL:jdbc:h2:file:./hermes_db_v2;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${APP_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${APP_DB_USERNAME:sa}
spring.datasource.password=${APP_DB_PASSWORD:}

# Schema management
spring.jpa.hibernate.ddl-auto=${APP_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# File upload limits (phone screenshots can be 5–10 MB)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Google OAuth 2.0 Credentials
# Configure these with environment variables before starting Hermes.
google.client.id=${APP_GOOGLE_CLIENT_ID:${GOOGLE_CLIENT_ID:}}
google.client.secret=${APP_GOOGLE_CLIENT_SECRET:${GOOGLE_CLIENT_SECRET:}}
app.google.redirect-uri=${APP_GOOGLE_REDIRECT_URI:${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}}

# Strava OAuth 2.0 Credentials
# Configure these with environment variables before starting Hermes.
# Strava token storage also requires APP_DATA_ENCRYPTION_KEY.
strava.client.id=${STRAVA_CLIENT_ID:${APP_STRAVA_CLIENT_ID:}}
strava.client.secret=${STRAVA_CLIENT_SECRET:${APP_STRAVA_CLIENT_SECRET:}}
app.strava.redirect-uri=${STRAVA_REDIRECT_URI:${APP_STRAVA_REDIRECT_URI:http://localhost:8080/api/auth/strava/callback}}

# Automated coach (polarized 80/20, nightly audit)
app.coach.nightly.enabled=true
app.coach.nightly.cron=0 0 3 * * *

# Background Strava pull (uses stored refresh tokens; Hermes must stay running)
strava.sync.enabled=true
# Default 10 minutes — pulls recent activities for every Strava-linked runner
strava.sync.interval-ms=${STRAVA_SYNC_INTERVAL_MS:600000}
# Pages × 200 activities max per runner per scheduled run (newest pages first; stops early if no new runs)
strava.sync.max-pages-recent=5
# Full history cap (login / manual resync)
strava.sync.max-pages-full=50

garmin.wellness.sync.enabled=${GARMIN_WELLNESS_SYNC_ENABLED:true}
garmin.wellness.sync.interval-ms=${GARMIN_WELLNESS_SYNC_INTERVAL_MS:1800000}
garmin.wellness.sync.days-back=${GARMIN_WELLNESS_SYNC_DAYS_BACK:30}
garmin.wellness.sync.initial-days-back=${GARMIN_WELLNESS_SYNC_INITIAL_DAYS_BACK:90}

# Strava Webhook (push notifications for new activities)
# Create a subscription once via Strava API:
#   POST https://www.strava.com/api/v3/push_subscriptions
#   client_id, client_secret, callback_url=https://YOUR_DOMAIN/api/strava/webhook,
#   verify_token=<same value as below>
strava.webhook.verify-token=${STRAVA_WEBHOOK_VERIFY_TOKEN:}

# AI Vision API (for shoe image scanning)
# Set APP_AI_API_KEY to enable AI-powered shoe mileage extraction from screenshots.
app.ai.api-key=${APP_AI_API_KEY:}
app.ai.model=${APP_AI_MODEL:gemini-2.5-flash}
app.ai.provider=${APP_AI_PROVIDER:gemini}
app.ai.course-map.provider=${APP_AI_COURSE_MAP_PROVIDER:qwen-local}
app.ai.course-map.pdf-render-page-limit=${APP_AI_COURSE_MAP_PDF_RENDER_PAGE_LIMIT:2}
app.ai.free-tier.per-runner-daily-limit=${APP_AI_FREE_TIER_PER_RUNNER_DAILY_LIMIT:5}
app.ai.free-tier.project-daily-limit=${APP_AI_FREE_TIER_PROJECT_DAILY_LIMIT:200}
app.ai.free-tier.project-daily-reserve=${APP_AI_FREE_TIER_PROJECT_DAILY_RESERVE:20}

# Marathon route extraction pipeline
# Step 1 uses local Qwen structured JSON output. Step 2 shells out to the local Python/OpenCV worker.
app.route-extraction.python-command=${APP_ROUTE_EXTRACTION_PYTHON_COMMAND:python}
app.route-extraction.python-script=${APP_ROUTE_EXTRACTION_PYTHON_SCRIPT:}
app.route-extraction.qwen.model-id=${APP_ROUTE_EXTRACTION_QWEN_MODEL_ID:Qwen/Qwen2.5-VL-7B-Instruct}
app.route-extraction.qwen.device-map=${APP_ROUTE_EXTRACTION_QWEN_DEVICE_MAP:auto}
app.route-extraction.qwen.cache-dir=${APP_ROUTE_EXTRACTION_QWEN_CACHE_DIR:}
app.route-extraction.qwen.timeout-seconds=${APP_ROUTE_EXTRACTION_QWEN_TIMEOUT_SECONDS:300}
app.route-extraction.qwen.alignment-timeout-seconds=${APP_ROUTE_EXTRACTION_QWEN_ALIGNMENT_TIMEOUT_SECONDS:720}
app.route-extraction.qwen.parameters-script=${APP_ROUTE_EXTRACTION_QWEN_PARAMETERS_SCRIPT:}
app.route-extraction.qwen.anchor-script=${APP_ROUTE_EXTRACTION_QWEN_ANCHOR_SCRIPT:}
app.route-extraction.qwen.alignment-script=${APP_ROUTE_EXTRACTION_QWEN_ALIGNMENT_SCRIPT:}

# Marathon route map matching
app.route-matching.osrm.base-url=${APP_ROUTE_MATCHING_OSRM_BASE_URL:https://router.project-osrm.org}
app.route-matching.osrm.profile=${APP_ROUTE_MATCHING_OSRM_PROFILE:driving}

# Stripe Checkout (Pro subscription — one-time payment per checkout, extends Pro by line-item quantity months)
# Create a one-time Price in Stripe Dashboard and paste its price_xxx id. Webhook: POST /api/billing/webhook
app.billing.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.billing.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.billing.stripe.price-pro-monthly=${STRIPE_PRICE_PRO_MONTHLY:}
app.billing.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
# Optional: shown in the Profile UI only (e.g. $9 / month or ¥68/月)
app.billing.price-display-label=${APP_BILLING_PRICE_LABEL:}

# Email (verification links for password sign-up). If SPRING_MAIL_HOST is empty, new accounts skip inbox verification (dev only).
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${APP_MAIL_FROM:noreply@localhost}

# Feature quota gating (premium feature limits for free users; -1 = unlimited for Pro)
app.quota.free.shoe-scan=2
app.quota.free.muscle-plan=0
app.quota.pro.shoe-scan=-1
app.quota.pro.muscle-plan=-1
